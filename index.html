<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serendipity Yacht Charter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #060c18;
        overflow: hidden;
      }

      #root {
        opacity: 0;
        transition: opacity 0.7s ease;
      }

      #root.visible {
        opacity: 1;
        overflow: auto;
      }

      #sl-loader {
        position: fixed;
        inset: 0;
        background: #060c18;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease, transform 0.8s ease;
        overflow: hidden;
      }

      #sl-loader.fade-out {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }

      /* Stars */
      .sl-star {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.7);
        animation: slTwinkle ease-in-out infinite;
      }
      @keyframes slTwinkle {
        0%,100% { opacity: 0.2; transform: scale(1); }
        50%      { opacity: 1;   transform: scale(1.4); }
      }

      /* Glow */
      .sl-glow {
        position: absolute;
        bottom: 38%; left: 50%;
        transform: translateX(-50%);
        width: 600px; height: 200px;
        background: radial-gradient(ellipse at center, rgba(201,162,39,0.08) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Horizon waves */
      .sl-horizon {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 45%; overflow: hidden;
      }
      .sl-wave {
        position: absolute;
        left: -20%; right: -20%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,162,39,0.15), rgba(201,162,39,0.35), rgba(201,162,39,0.15), transparent);
        animation: slWave linear infinite;
      }
      .sl-wave:nth-child(1) { bottom: 10%; animation-duration: 9s;  opacity: 0.9; }
      .sl-wave:nth-child(2) { bottom: 15%; animation-duration: 11s; opacity: 0.6; animation-delay: -3s; }
      .sl-wave:nth-child(3) { bottom: 20%; animation-duration: 8s;  opacity: 0.4; animation-delay: -1.5s; }
      .sl-wave:nth-child(4) { bottom: 25%; animation-duration: 13s; opacity: 0.3; animation-delay: -5s; }
      .sl-wave:nth-child(5) { bottom: 30%; animation-duration: 10s; opacity: 0.2; animation-delay: -2s; }
      .sl-wave:nth-child(6) { bottom: 36%; animation-duration: 14s; opacity: 0.15; animation-delay: -7s; }
      .sl-wave:nth-child(7) { bottom: 42%; animation-duration: 16s; opacity: 0.1; animation-delay: -4s; }
      @keyframes slWave {
        0%   { transform: translateX(0) scaleY(1); }
        25%  { transform: translateX(-4%) scaleY(1.5); }
        50%  { transform: translateX(3%) scaleY(0.8); }
        75%  { transform: translateX(-2%) scaleY(1.3); }
        100% { transform: translateX(0) scaleY(1); }
      }

      /* Center branding */
      .sl-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        animation: slFadeUp 1s ease forwards;
      }
      @keyframes slFadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .sl-yacht {
        width: 64px; height: 64px;
        margin-bottom: 28px;
        animation: slBob 4s ease-in-out infinite;
      }
      @keyframes slBob {
        0%,100% { transform: translateY(0) rotate(-1deg); }
        50%      { transform: translateY(-8px) rotate(1deg); }
      }

      .sl-eyebrow {
        letter-spacing: 0.18em; font-size: 11px;
        font-family: 'Trebuchet MS', sans-serif; font-weight: 700;
        color: rgba(201,162,39,0.8); text-transform: uppercase;
        margin-bottom: 10px;
        animation: slFadeUp 1s 0.15s ease both;
      }
      .sl-name {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 52px; font-weight: 400;
        color: #f5f0e6; letter-spacing: 0.06em;
        line-height: 1; margin-bottom: 6px;
        animation: slFadeUp 1s 0.3s ease both;
      }
      .sl-sub {
        font-family: 'Trebuchet MS', sans-serif; font-size: 10px;
        color: rgba(255,255,255,0.25); letter-spacing: 0.35em;
        text-transform: uppercase; margin-bottom: 52px;
        animation: slFadeUp 1s 0.45s ease both;
      }

      .sl-divider {
        height: 1px; background: rgba(201,162,39,0.6);
        margin: 0 auto 48px;
        animation: slExpand 1.2s 0.5s ease both;
      }
      @keyframes slExpand {
        from { width: 0; opacity: 0; }
        to   { width: 40px; opacity: 1; }
      }

      .sl-progress-wrap {
        width: 220px; height: 1px;
        background: rgba(255,255,255,0.08);
        overflow: hidden; margin-bottom: 20px;
        animation: slFadeUp 1s 0.6s ease both;
      }
      .sl-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, rgba(201,162,39,0.4), rgba(201,162,39,1), rgba(201,162,39,0.4));
        width: 0%;
        box-shadow: 0 0 8px rgba(201,162,39,0.5);
        animation: slLoad 2.8s 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      }
      @keyframes slLoad {
        0%   { width: 0%; }
        60%  { width: 75%; }
        80%  { width: 88%; }
        100% { width: 100%; }
      }

      .sl-status {
        font-family: 'Trebuchet MS', sans-serif; font-size: 10px;
        letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        animation: slFadeUp 1s 0.7s ease both;
        min-height: 16px; transition: opacity 0.4s;
      }
    </style>
  </head>
  <body>

    <!-- LOADER -->
    <div id="sl-loader">
      <div class="sl-glow"></div>

      <div class="sl-horizon">
        <div class="sl-wave"></div>
        <div class="sl-wave"></div>
        <div class="sl-wave"></div>
        <div class="sl-wave"></div>
        <div class="sl-wave"></div>
        <div class="sl-wave"></div>
        <div class="sl-wave"></div>
      </div>

      <div class="sl-center">
        <svg class="sl-yacht" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="32" y1="8" x2="32" y2="42" stroke="rgba(201,162,39,0.9)" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M32 10 L14 40 L32 40 Z" fill="rgba(201,162,39,0.12)" stroke="rgba(201,162,39,0.5)" stroke-width="0.8"/>
          <path d="M32 14 L50 40 L32 40 Z" fill="rgba(201,162,39,0.08)" stroke="rgba(201,162,39,0.3)" stroke-width="0.8"/>
          <path d="M10 44 Q32 52 54 44 L50 48 Q32 57 14 48 Z" fill="rgba(201,162,39,0.2)" stroke="rgba(201,162,39,0.7)" stroke-width="1"/>
          <line x1="6" y1="51" x2="58" y2="51" stroke="rgba(201,162,39,0.2)" stroke-width="0.6" stroke-dasharray="3 4"/>
          <path d="M32 8 L40 11 L32 14 Z" fill="rgba(201,162,39,0.7)"/>
        </svg>
        <div class="sl-eyebrow">Gulf Coast Charter</div>
        <div class="sl-name">Serendipity</div>
        <div class="sl-sub">Saint Petersburg, Florida</div>
        <div class="sl-divider"></div>
        <div class="sl-progress-wrap">
          <div class="sl-progress-bar"></div>
        </div>
        <div class="sl-status" id="sl-status">Preparing your experience...</div>
      </div>
    </div>

    <!-- APP ROOT -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Star field
      const loader = document.getElementById('sl-loader');
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'sl-star';
        const size = Math.random() * 1.8 + 0.4;
        s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*58}%;left:${Math.random()*100}%;animation-duration:${2.5+Math.random()*3.5}s;animation-delay:${Math.random()*4}s;`;
        loader.appendChild(s);
      }

      // Status cycling
      const statuses = [
        'Preparing your experience...',
        'Loading vessel details...',
        'Charting the Gulf Coast...',
        'Finalizing your journey...',
        'Welcome aboard.',
      ];
      let sIdx = 0;
      const statusEl = document.getElementById('sl-status');
      const interval = setInterval(() => {
        sIdx++;
        if (sIdx < statuses.length) {
          statusEl.style.opacity = '0';
          setTimeout(() => { statusEl.textContent = statuses[sIdx]; statusEl.style.opacity = '1'; }, 300);
        } else {
          clearInterval(interval);
        }
      }, 700);

      // Dismiss after 3.6s
      setTimeout(() => {
        loader.classList.add('fade-out');
        setTimeout(() => {
          loader.remove();
          document.body.style.overflow = '';
          document.getElementById('root').classList.add('visible');
        }, 800);
      }, 3600);
    </script>

  </body>
</html>
